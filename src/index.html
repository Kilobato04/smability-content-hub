<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smability Content Hub | Producción Abril 2026</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    </head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <img src="assets/logo.png" alt="Smability" class="main-logo">
            </div>
            <div class="status-badge">Meta 2026: $200k USD</div>
        </header>

        <main class="content-grid">
            <section class="control-panel">
                <div class="selector-group">
                    <h2>🚀 Panel de Producción</h2>
                    <p class="helper-text">Selecciona un post del Pipeline de Abril:</p>
                    <select id="post-selector">
                        <option value="">Cargando plan maestro…</option>
                    </select>
                    <button id="generate-btn" class="primary-btn">⚡ Generar Mix de Contenidos</button>
                </div>
            
                <div class="output-area">
                    <div class="area-header">
                        <h3>👤 Perfil Personal (Horacio)</h3>
                        <span class="target-tag">B2B Insight</span>
                    </div>
                    <textarea id="linkedin-post-output" readonly placeholder="Aquí aparecerá el copy para Horacio..."></textarea>
                    <div class="action-buttons">                     
                        <button class="copy-btn" onclick="copyText('linkedin-post-output')">Copiar Contenido</button>
                    </div>
                </div>
            
                <div class="output-area">
                    <div class="area-header">
                        <h3>🏢 Perfil Corporativo (Smability)</h3>
                        <span class="target-tag">Brand Awareness</span>
                    </div>
                    <textarea id="smability-post-output" readonly placeholder="Aquí aparecerá el copy para la Company Page..."></textarea>
                    <div class="action-buttons">
                        <button class="copy-btn" onclick="copyText('smability-post-output')">Copiar Contenido</button>
                    </div>
                </div>
            </section>

            <section class="preview-panel">
                <div class="preview-header">
                    <h2>🖼️ Vista Previa Reel (Unificado)</h2>
                    <span class="format-tag">1080x1080</span>
                </div>
                
                <div id="carousel-preview-container">
                    </div>
                
                <div class="download-group">
                    <button id="download-pdf-btn" class="primary-btn" disabled>
                        📄 Descargar PDF
                    </button>
                    <button id="download-png-btn" class="secondary-btn" disabled>
                        📷 Bajar PNGs
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
