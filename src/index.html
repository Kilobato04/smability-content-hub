<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smability Content Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <img src="assets/logo.png" alt="Smability" class="main-logo">
            <div class="status-badge">Meta 2026: $200k USD </div>
        </header>

        <main class="content-grid">
            <section class="control-panel">
                <div class="selector-group">
                    <h2>🚀 Panel de Producción</h2>
                    <select id="post-selector">
                        <option value="">Cargando plan maestro…</option>
                    </select>
                    <button id="generate-btn" class="primary-btn">⚡ Generar Mix de Contenidos</button>
                </div>
            
                <div class="output-area">
                    <h3>👤 Perfil Personal (Horacio)</h3>
                    <textarea id="linkedin-post-output" readonly></textarea>
                    <div class="action-buttons">                    
                        <button class="primary" onclick="copyText('linkedin-post-output')">Copiar</button>
                    </div>
                </div>
            
                <div class="output-area">
                    <h3>🏢 Perfil Corporativo (Smability)</h3>
                    <textarea id="smability-post-output" readonly></textarea>
                    <div class="action-buttons">
                        <button class="primary" onclick="copyText('smability-post-output')">Copiar</button>
                    </div>
                </div>
            </section>

            <section class="preview-panel">
                <h2>🖼️ Vista Previa Reel (Unificado)</h2>
                <div id="carousel-preview-container"></div>
                
                <div class="download-group" style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="download-pdf-btn" class="primary-btn" disabled style="flex: 2;">
                        ↓ Descargar PDF para LinkedIn
                    </button>
                    <button id="download-png-btn" class="secondary-btn" disabled style="flex: 1; background-color: var(--bg-s2); border: 1px solid var(--border); color: var(--g100);">
                        📷 PNGs (ZIP)
                    </button>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
