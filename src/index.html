<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smability Content Hub - Primer Deploy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <img src="assets/logo.png" alt="Smability Logo" class="main-logo">
            <div class="header-info">
                <h1>Hub de Contenidos</h1>
                <div class="status-badge">Meta Abril: $40k USD</div>
            </div>
        </header>

        <main class="content-grid">
            <section class="control-panel">
                <div class="calendar-section">
                    <h2>📅 Calendario de Abril</h2>
                    <div class="calendar-header">
                        <select id="month-selector">
                            <option value="0">Enero</option>
                            <option value="1">Febrero</option>
                            <option value="2">Marzo</option>
                            <option value="3" selected>Abril</option>
                            <option value="4">Mayo</option>
                            <option value="5">Junio</option>
                        </select>
                        <span id="year-label">2026</span>
                    </div>
                    <div id="calendar-grid" class="calendar-mini"></div>
                </div>
                
                <hr>

                <h2>🚀 Generador de Post</h2>
                <div class="selector-group">
                    <label for="post-selector">Selecciona un post del plan:</label>
                    <select id="post-selector">
                        <option value="">Cargando plan maestro...</option>
                    </select>
                </div>

                <button id="generate-btn" class="primary-btn">Generar Post e Imágenes</button>
                
                <div class="output-area">
                    <h3>Copy para LinkedIn (Propuesta IA)</h3>
                    <textarea id="linkedin-post-output" readonly></textarea>
                    <div class="action-buttons">
                        <button class="secondary">Editar</button>
                        <button class="primary" onclick="copyText()">Copiar Texto</button>
                    </div>
                </div>
            </section>

            <section class="preview-panel">
                <h2>🖼️ Vista Previa Carrusel (Enterprise Style)</h2>
                <div id="carousel-preview-container">
                    <div class="carousel-placeholder">Selecciona un post para visualizar el carrusel...</div>
                </div>
                <button id="download-pdf-btn" disabled>Descargar PDF para LinkedIn</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
